  <title>Ajay Lakhara | UI/UX Designer & Full-Stack Developer</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Caveat:wght@400;700&display=swap"
    as="style" onload="this.onload=null;this.rel='stylesheet'">

    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Caveat:wght@400;700&display=swap">
  </noscript>
  <!-- LCP Image Preload: profile image is primary content image -->
  <link rel="preload" href="/Portfolio_Website/optimized/profile.webp" as="image" type="image/webp" />
  <!-- Critical inline CSS: prevent CLS from unstyled content flash -->
  <style>
    html {
      background: #ffffff;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, sans-serif;
    }

    #root {
